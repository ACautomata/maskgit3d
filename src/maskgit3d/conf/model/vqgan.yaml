# @package _global_
# VQGAN Model Configuration

model:
  name: vqgan
  type: vqgan3d
  
  # Model parameters
  in_channels: 1
  image_size: 64
  codebook_size: 1024
  embed_dim: 256
  latent_channels: 256
  resolution: 64
  
  # Architecture
  channel_multipliers: [1, 1, 2, 2, 4]
  num_res_blocks: 2
  attn_resolutions: [16, 8]
  dropout: 0.0
