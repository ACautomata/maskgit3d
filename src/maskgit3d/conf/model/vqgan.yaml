# @package _global_
# VQGAN Model Configuration
# IMPORTANT: latent_channels must be >= 64 for GroupNorm compatibility
# embed_dim must equal latent_channels // 2 for decoder

model:
  name: vqgan
  type: vqgan3d
  
  # Model parameters
  in_channels: 1
  image_size: 64
  codebook_size: 1024
  # Architecture constraints:
  # - latent_channels >= 64 (for GroupNorm's 32 groups)
  # - embed_dim = latent_channels // 2
  latent_channels: 128  # Must be >= 64
  embed_dim: 64        # Must = latent_channels // 2
  resolution: 64
  
  # Architecture - 8x downsampling (3 downsample operations = 4 levels)
  # channel_multipliers length = 4 → 3 downsamples → 8x spatial reduction
  channel_multipliers: [1, 2, 4, 8]
  num_res_blocks: 2
  attn_resolutions: [8]
  dropout: 0.0
  
  # Evaluation configuration
  evaluation:
    enabled: true
    metrics:
      - psnr
      - ssim
      - lpips
    save_metrics: true
    export_format: [json, csv]  # Export metrics to both formats

# Metrics configuration
metrics:
  type: vqgan
  params:
    # Input normalization: expects tensors in [-1, 1] range
    # Normalized internally to [0, data_range] for metric computation
    data_range: 1.0          # Data range after normalization
    spatial_dims: 3          # 3D volumetric data
    enable_lpips: true       # Enable LPIPS perceptual metric
    lpips_backbone: alex     # LPIPS backbone: "alex" (recommended) or "vgg"
                             # AlexNet: Better for perceptual similarity
                             # VGG16: Alternative, may give different scores
                             # See: https://github.com/richzhang/PerceptualSimilarity

# Training configuration for validation metrics
training:
  enable_val_metrics: true   # Enable PSNR/SSIM/LPIPS during validation
