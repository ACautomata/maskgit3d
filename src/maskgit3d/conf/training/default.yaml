# @package _global_
# Default Training Configuration

training:
  # Training loop
  num_epochs: 100
  val_frequency: 1
  log_interval: 10
  
  # Strategy
  strategy_type: maskgit  # maskgit, vqgan
  
  # Strategy specific parameters
  maskgit:
    mask_schedule_type: cosine  # cosine, linear, square, cubic
    reconstruction_weight: 1.0
  
  vqgan:
    codebook_weight: 1.0
    pixel_loss_weight: 1.0
    perceptual_weight: 1.0
    disc_weight: 0.1
    disc_start: 500
  
  # Optimizer - AdamW as default (recommended for transformers and medical imaging)
  optimizer:
    type: adamw  # adam, adamw, sgd
    lr: 1.0e-4
    weight_decay: 0.01
    
    # AdamW specific (optimized for transformers)
    betas: [0.9, 0.95]
    eps: 1.0e-8
    
    # SGD specific
    momentum: 0.9
    
    # VQGAN specific (GAN training)
    lr_g: 4.5e-6
    lr_d: 4.5e-6
    betas_gan: [0.5, 0.9]
  
  # Learning rate scheduler
  scheduler:
    enabled: false
    type: cosine  # cosine, step, plateau
    warmup_epochs: 0
    min_lr: 1.0e-6
  
  # Gradient clipping
  gradient_clip:
    enabled: false
    max_norm: 1.0
  
  # Fabric configuration (for distributed training)
  fabric:
    enabled: false
    accelerator: auto  # auto, cpu, cuda, mps
    devices: auto      # auto, 1, 2, [0, 1]
    strategy: auto     # auto, ddp, ddp_spawn, fsdp
    precision: 32-true # 32-true, 16-mixed, bf16-mixed
  
  # Callbacks configuration
  callbacks:
    model_checkpoint:
      enabled: true
      monitor: val_loss
      mode: min
      save_top_k: 3
      filename: "{epoch:02d}-{val_loss:.4f}"
      save_last: true
      save_best: true
    early_stopping:
      enabled: false
      monitor: val_loss
      mode: min
      patience: 10
      min_delta: 0.0
    nan_monitor:
      enabled: true
      check_interval: 10
