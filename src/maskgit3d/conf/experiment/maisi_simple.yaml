# @package _global_
# Example: MAISI VQ + Simple Dataset (for testing)

defaults:
  - override /model: maisi_vq
  - override /dataset: simple
  - override /training: default
  - override /system: default

experiment_name: maisi_simple_test

model:
  image_size: 64
  in_channels: 1
  codebook_size: 512
  latent_channels: 4

dataset:
  batch_size: 4
  num_train: 50
  num_val: 10
  num_test: 10

training:
  num_epochs: 10
  val_frequency: 2
  strategy_type: vqgan
  
  optimizer:
    type: adam
    lr: 1.0e-4

# Checkpoint configuration uses Hydra output directory
checkpoint:
  save_dir: null
