# @package _global_
# Optimized MaskGIT + MedMNIST 3D Configuration

defaults:
  - override /model: maskgit
  - override /dataset: medmnist3d
  - override /training: default
  - override /system: default

experiment_name: maskgit_medmnist_optimized

model:
  image_size: 64
  in_channels: 1
  codebook_size: 1024
  embed_dim: 256
  latent_channels: 256
  
  # 8x downsampling architecture
  channel_multipliers: [1, 2, 4, 8]
  num_res_blocks: 2
  attn_resolutions: [8]
  
  # Transformer configuration
  transformer_hidden: 512
  transformer_layers: 8
  transformer_heads: 8

dataset:
  batch_size: 8
  dataset_name: organmnist3d
  spatial_size: [64, 64, 64]

training:
  num_epochs: 200
  val_frequency: 5
  strategy_type: maskgit
  
  optimizer:
    type: adamw
    lr: 2.0e-4
    weight_decay: 0.05
    betas: [0.9, 0.95]
  
  scheduler:
    enabled: true
    type: cosine
    warmup_epochs: 10
    min_lr: 1.0e-6
  
  gradient_clip:
    enabled: true
    max_norm: 1.0

# Checkpoint configuration uses Hydra output directory
checkpoint:
  save_dir: null
