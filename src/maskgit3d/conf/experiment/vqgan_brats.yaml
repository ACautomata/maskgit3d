# @package _global_
# Optimized VQGAN + BraTS Configuration

defaults:
  - override /model: vqgan
  - override /dataset: brats
  - override /training: default
  - override /system: default

experiment_name: vqgan_brats_optimized

model:
  image_size: 128
  in_channels: 4
  codebook_size: 512
  latent_channels: 64
  embed_dim: 32
  
  # 8x downsampling architecture
  channel_multipliers: [1, 2, 4, 8]
  num_res_blocks: 2
  attn_resolutions: [16]

dataset:
  batch_size: 2
  image_size: 128
  in_channels: 4
  spatial_size: [128, 128, 128]

training:
  num_epochs: 300
  val_frequency: 10
  strategy_type: vqgan
  
  vqgan:
    codebook_weight: 1.0
    pixel_loss_weight: 1.0
    perceptual_weight: 0.3
    disc_weight: 0.1
    disc_start: 50000
  
  optimizer:
    type: adamw
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.95]
    
    lr_g: 4.5e-6
    lr_d: 4.5e-6
    betas_gan: [0.5, 0.9]
  
  scheduler:
    enabled: true
    type: cosine
    warmup_epochs: 20
    min_lr: 1.0e-7
  
  gradient_clip:
    enabled: true
    max_norm: 1.0

checkpoint:
  save_dir: ./checkpoints/vqgan_brats
