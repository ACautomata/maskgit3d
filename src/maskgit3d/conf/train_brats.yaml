# BraTS 2023 Training Configuration
# Inherits from train.yaml and overrides BraTS-specific settings
#
# Usage:
#   maskgit3d-train --config-name train_brats
#   maskgit3d-train --config-name train_brats trainer.max_epochs=100

defaults:
  - train
  - override /data: brats2023
  - override /model: vqvae
  - override /trainer: brats
  - override /callbacks: vqvae
  - _self_

# Override task parameters for BraTS (large 3D volumes)
task:
  sliding_window:
    enabled: true
    roi_size: [128, 128, 128]
    sw_batch_size: 1