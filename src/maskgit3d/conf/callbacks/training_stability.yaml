# Training stability monitoring callback configuration
# Monitors loss spikes, gradient explosion/vanishing, and training health metrics

training_stability:
  _target_: maskgit3d.callbacks.training_stability.TrainingStabilityCallback
  loss_window_size: 100  # Window size for moving average calculations
  loss_spike_threshold: 2.0  # Multiplier for loss spike detection
  grad_explosion_threshold: 1000.0  # Maximum allowed gradient norm
  grad_vanishing_threshold: 1.0e-7  # Minimum allowed gradient norm
  log_every_n_steps: 10  # How often to log metrics
  alert_on_spike: true  # Whether to log warnings on loss spikes
  stop_on_explosion: false  # Whether to stop training on gradient explosion
  check_gradients: true  # Whether to check gradient norms