# Default callbacks configuration for maskgit-3d training
# Includes essential callbacks for checkpointing, early stopping, and monitoring

defaults:
  - vqvae_metrics
  - maskgit_metrics
  - model_checkpoint
  - model_checkpoint_maskgit
  - early_stopping
  - early_stopping_maskgit
  - lr_monitor
  - nan_detection
  - training_time
  - gradient_norm
  - training_stability
  - cuda_memory
  - _self_

# Rich progress bar for better visualization (optional)
# Uncomment if rich is installed:
# - _target_: lightning.pytorch.callbacks.RichProgressBar
#   theme:
#     _target_: lightning.pytorch.callbacks.progress.rich_progress.RichProgressBarTheme
#   description: "Training"

# TQDM progress bar (default, always included by Trainer)
# No explicit config needed
