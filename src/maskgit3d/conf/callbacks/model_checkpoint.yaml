# ModelCheckpoint callback configuration
# Saves model checkpoints based on monitored metric

# Best checkpoint - saves top-k models based on validation metric
best_checkpoint:
  _target_: lightning.pytorch.callbacks.ModelCheckpoint
  dirpath: "checkpoints/${now:%Y-%m-%d}/${now:%H-%M-%S}"
  filename: "{epoch:03d}-{val_loss:.4f}"
  monitor: "val_loss"
  mode: min
  save_top_k: 3
  save_last: false
  save_weights_only: false
  every_n_epochs: 1
  every_n_train_steps: null
  train_time_interval: null
  auto_insert_metric_name: true

# Last checkpoint - always saves the most recent model
last_checkpoint:
  _target_: lightning.pytorch.callbacks.ModelCheckpoint
  dirpath: "checkpoints/${now:%Y-%m-%d}/${now:%H-%M-%S}"
  filename: "last"
  monitor: null
  mode: min
  save_top_k: 0
  save_last: true
  save_weights_only: false
  every_n_epochs: 1
  every_n_train_steps: null
  train_time_interval: null
