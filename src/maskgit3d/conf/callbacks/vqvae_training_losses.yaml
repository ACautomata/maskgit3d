# Individual VQVAE training loss callbacks - one per metric
# Each callback logs a single loss component

train_loss:
  _target_: maskgit3d.callbacks.vqvae_training_losses.TrainingLossCallback
  metric_name: loss
  log_name: train/loss
  prog_bar: true
  log_every_n_steps: 1

train_loss_g:
  _target_: maskgit3d.callbacks.vqvae_training_losses.TrainingLossCallback
  metric_name: loss_g
  log_name: train/loss_g
  prog_bar: false
