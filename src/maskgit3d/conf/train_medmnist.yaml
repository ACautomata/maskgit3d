# Training Configuration for MedMNIST 3D VQVAE
# One-command training with optimized settings for small datasets
#
# Usage:
#   maskgit3d-train --config-name train_medmnist
#   maskgit3d-train --config-name train_medmnist trainer.max_epochs=200
#   maskgit3d-train --config-name train_medmnist data.batch_size=32

defaults:
  - _self_
  - model: vqvae_small
  - task: vqvae_medmnist
  - data: medmnist3d
  - optimizer: adam
  - trainer: default
  - optional callbacks: default
  - optional logger: tensorboard

seed: 42
checkpoint_path: null