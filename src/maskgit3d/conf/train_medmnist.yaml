# Training Configuration for MedMNIST 3D VQVAE
# Optimized settings for small datasets (~1000 training samples)
#
# Key optimizations:
# - vqvae_small model for faster training
# - Lower disc_start (150) to enable GAN early
# - Higher lambda_perceptual (0.5) for better FID
# - Shorter warmup for smaller dataset
#
# Usage:
#   maskgit3d-train --config-name train_medmnist
#   maskgit3d-train --config-name train_medmnist trainer.max_epochs=200
#   maskgit3d-train --config-name train_medmnist data.batch_size=32

defaults:
  - train
  - override /model: vqvae_small
  - override /callbacks: vqvae_medmnist
  - _self_

# Override task parameters for MedMNIST (small dataset)
task:
  lr_g: 2.0e-4
  lr_d: 2.0e-4
  warmup_steps: 50
  min_lr_ratio: 0.01
  lambda_perceptual: 0.5
  disc_start: 150