# @package _global_
# MedMNIST 3D Dataset Configuration

dataset:
  name: medmnist3d
  type: medmnist3d
  
  # Data parameters
  data_dir: ./data
  batch_size: 4
  num_workers: 4
  
  # Dataset specific
  dataset_name: organmnist3d  # organmnist3d, nodulemnist3d, etc.
  split: train
  download: true
  
  # Resolution settings
  # input_size: Original MedMNIST resolution (28 or 64)
  # image_size: Target spatial size after preprocessing
  # Use input_size=64 for native 64x64x64 data (better quality)
  # Use input_size=28 for legacy 28x28x28 data
  input_size: 28  # 28 or 64 - MedMNIST native resolution
  image_size: 64  # Target spatial size (D, H, W)
  
  # Training and inference size settings
  crop_size: [64, 64, 64]  # Random crop size for training (D, H, W)
  roi_size: [64, 64, 64]   # ROI size for inference sliding window (D, H, W)
  
  in_channels: 1
  
  # Data augmentation
  augmentation:
    enabled: true
    random_flip: true
    random_rotate: true
    random_scale: true
    normalize: true
  
  # Number of samples (for synthetic/simple datasets)
  num_train: 1000
  num_val: 100
  num_test: 100
