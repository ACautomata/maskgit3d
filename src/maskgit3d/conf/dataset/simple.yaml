# @package _global_
# Simple/Synthetic Dataset Configuration
# Uses synthetic 3D volumes for testing

dataset:
  name: simple
  type: simple
  
  # Data parameters
  batch_size: 2
  num_workers: 0
  
  # Image parameters - match model config
  image_size: 32  # Smaller for faster testing
  in_channels: 1
  
  # Number of synthetic samples
  num_train: 10
  num_val: 5
  num_test: 5

