# DEPRECATION NOTICE (v2.0)
# Direct task instantiation with these parameters is deprecated.
# Use build_vqvae_task() from runtime.composition instead.
# See docs/migration/v2.0.md for migration guide.
_target_: maskgit3d.tasks.vqvae_task.VQVAETask

model_config: ${model}
optimizer_config: ${optimizer}
disc_optimizer_config: ${optimizer}
data_config: ${data}

lr_g: 5.0e-5
lr_d: 5.0e-5

lambda_l1: 1.0
lambda_vq: 1.0
lambda_gan: 0.1

use_perceptual: true
lambda_perceptual: 0.1
perceptual_network: alex

disc_start: 2000
disc_factor: 1.0
use_adaptive_weight: true
adaptive_weight_max: 100.0
disc_loss: hinge

gradient_clip_enabled: true
gradient_clip_val: 1.0

num_splits: null
dim_split: 0

sliding_window:
  enabled: true
  roi_size: [32, 32, 32]
  overlap: 0.25
  mode: gaussian
  sigma_scale: 0.125
  sw_batch_size: 4
  sw_device: null
  device: null
