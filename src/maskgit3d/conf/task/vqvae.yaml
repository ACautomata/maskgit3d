_target_: maskgit3d.tasks.vqvae_task.VQVAETask

in_channels: 1
out_channels: 1
latent_channels: 256
num_embeddings: 8192
embedding_dim: 256

lr_g: 5.0e-5
lr_d: 1.0e-4

lambda_l1: 1.0
lambda_vq: 1.0
lambda_gan: 0.5

use_perceptual: true
lambda_perceptual: 0.5
perceptual_network: alex

disc_start: 15000
disc_factor: 1.0
use_adaptive_weight: true
disc_loss: hinge
commitment_cost: 0.5

sliding_window:
  enabled: true
  roi_size: [64, 64, 64]
  overlap: 0.25
  mode: gaussian
  sigma_scale: 0.125
  sw_batch_size: 1
