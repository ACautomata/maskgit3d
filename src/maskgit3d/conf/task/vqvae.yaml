_target_: maskgit3d.tasks.vqvae_task.VQVAETask

model_config: ${model}
optimizer_config: ${optimizer}
disc_optimizer_config: ${optimizer}

lr_g: 5.0e-5
lr_d: 1.0e-4

lambda_l1: 1.0
lambda_vq: 1.0
lambda_gan: 0.5

use_perceptual: true
lambda_perceptual: 0.5
perceptual_network: alex

disc_start: 15000
disc_factor: 1.0
use_adaptive_weight: true
adaptive_weight_max: 100.0
disc_loss: hinge

gradient_clip_enabled: true
gradient_clip_val: 1.0

sliding_window:
  enabled: true
  roi_size: [64, 64, 64]
  overlap: 0.25
  mode: gaussian
  sigma_scale: 0.125
  sw_batch_size: 1
