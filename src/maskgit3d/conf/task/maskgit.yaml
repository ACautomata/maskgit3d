_target_: maskgit3d.tasks.maskgit_task.MaskGITTask

# VQVAE checkpoint path (required for Stage 2)
vqvae_ckpt_path: null

# Optimizer settings
lr: 0.0001
weight_decay: 0.05
warmup_steps: 1000

# Sliding window inference configuration for VQVAE encoding
sliding_window:
  enabled: false
  roi_size: [32, 32, 32]
  overlap: 0.25
  mode: gaussian
  sigma_scale: 0.125
  sw_batch_size: 4
  sw_device: null
  device: null