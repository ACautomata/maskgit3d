# DEPRECATION NOTICE (v2.0)
# Direct task instantiation with these parameters is deprecated.
# Use build_maskgit_task() from runtime.composition instead.
# See docs/migration/v2.0.md for migration guide.
_target_: maskgit3d.tasks.maskgit_task.MaskGITTask
model_config: ${model}
optimizer_config: ${optimizer}
vqvae_ckpt_path: null

lr: 0.0002
weight_decay: 0.05
warmup_steps: 1000

# Sliding window inference configuration for VQVAE encoding
sliding_window:
  enabled: false
  roi_size: [32, 32, 32]
  overlap: 0.25
  mode: gaussian
  sigma_scale: 0.125
  sw_batch_size: 4
  sw_device: null
  device: null
