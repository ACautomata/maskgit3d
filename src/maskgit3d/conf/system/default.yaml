# @package _global_
# System Configuration

system:
  # Device
  device: auto  # auto, cpu, cuda, cuda:0
  
  # Random seed
  seed: 42
  
  # Deterministic behavior
  deterministic: false
  
  # Benchmark mode (for CUDNN)
  benchmark: true
  
  # Mixed precision (when not using Fabric)
  amp:
    enabled: false
    dtype: float16  # float16, bfloat16
  
  # Distributed training
  distributed:
    enabled: false
    backend: nccl  # nccl, gloo, mpi
    init_method: env://
    world_size: 1
    rank: 0
    local_rank: 0
